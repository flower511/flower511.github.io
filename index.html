<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月亮叫醒你了</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:
    radial-gradient(circle at 15% 20%, #eaf6ef, transparent 40%),
    radial-gradient(circle at 85% 0%, #eef2ff, transparent 40%),
    linear-gradient(135deg,#f7f9fc,#eef2f6);
  min-height:100vh;
  padding:20px;
}

.card{
  max-width:820px;
  margin:auto;
  background:#fff;
  border-radius:18px;
  padding:34px 22px;
  box-shadow:0 14px 45px rgba(0,0,0,.08);
  text-align:center;
}

h1{
  font-size:2.2em;
  background:linear-gradient(90deg,#3cb371,#2ecc71);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:6px;
  color:#777;
  font-size:.95em;
}

.notice{
  margin-top:14px;
  padding:12px;
  border-radius:10px;
  background:#f6f8fb;
  font-size:.95em;
  color:#555;
}

.section{margin:26px 0}

.section h2{
  font-size:1.2em;
  margin-bottom:8px;
}

p{
  color:#555;
  font-size:1.05em;
  margin:6px 0;
}

.btn{
  display:inline-block;
  padding:12px 30px;
  background:#3cb371;
  color:#fff;
  border-radius:30px;
  font-weight:bold;
  text-decoration:none;
  margin-top:10px;
}

.wechat{
  font-size:1.15em;
  margin-top:8px;
}

#wechatId{
  color:#007bff;
  cursor:pointer;
  font-weight:bold;
}

#copyTip,#resultMsg{
  margin-top:8px;
  font-size:.95em;
  font-weight:bold;
}

.hint{
  margin-top:10px;
  padding:10px;
  background:#f0f6f2;
  border-radius:8px;
  font-size:.9em;
  color:#4a7c5f;
}

input{
  width:80%;
  max-width:360px;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:1em;
}

button{
  margin-top:12px;
  padding:12px 34px;
  border:none;
  border-radius:30px;
  background:#3cb371;
  color:#fff;
  font-size:1em;
  cursor:pointer;
}

button:disabled{
  background:#9fd5b8;
  cursor:not-allowed;
}

.stats{
  margin-top:30px;
  padding-top:20px;
  border-top:1px dashed #ddd;
  font-size:.9em;
  color:#888;
}
</style>
</head>

<body>

<div class="card">
  <h1>月亮叫醒你了</h1>
  <div class="sub">简单 · 稳定 · 长期可用</div>

  <div class="notice" id="envTip"></div>

  <!-- 浏览器下载区 -->
  <div class="section" id="downloadSection">
    <h2>📥 获取方式</h2>
    <p>支持常见设备</p>
    <a class="btn" target="_blank"
      href="https://one.714541.xyz/@s/GnjKADR7">
      打开获取页面
    </a>
  </div>

  <div class="section">
    <h2>📱 直接联系</h2>
    <div class="wechat">
      微信：<span id="wechatId">272017090</span>
    </div>
    <div id="copyTip"></div>
    <div class="hint">💡 复制后打开微信搜索即可添加，备注「获取方式」</div>
  </div>

  <div class="section">
    <h2>📩 不方便加？我来联系你</h2>
    <form id="form">
      <input id="wx" maxlength="30" placeholder="填写你的微信号">
      <br>
      <button id="btn">提交</button>
      <div id="resultMsg"></div>
      <div class="hint">⏰ 一般在晚上统一回复，不会打扰</div>
    </form>
  </div>

  <div class="stats" id="stats"></div>
</div>

<script>
/* 环境判断 */
const ua = navigator.userAgent.toLowerCase();
const isWeChat = ua.includes("micromessenger");

envTip.textContent = isWeChat
  ? "当前在微信内，建议直接联系获取方式"
  : "当前在浏览器中，可查看完整信息";

if(isWeChat){
  downloadSection.style.display="none";
}

/* 统计 */
let views = localStorage.views = (Number(localStorage.views)||0)+1;
let submits = Number(localStorage.submits||0);
function renderStats(){
  let rate=submits?((submits/views)*100).toFixed(1):0;
  stats.textContent=`访问 ${views} ｜ 留资 ${submits} ｜ 转化 ${rate}%`;
}
renderStats();

/* 复制微信 */
wechatId.onclick=()=>{
  navigator.clipboard.writeText(wechatId.innerText).then(()=>{
    copyTip.textContent="✅ 已复制 → 打开微信搜索添加";
    copyTip.style.color="#3cb371";
  });
};

/* 提交 */
form.onsubmit=e=>{
  e.preventDefault();
  if(!wx.value.trim())return;

  btn.disabled=true;
  btn.textContent="提交中...";

  fetch(`https://api.day.app/qYjTNs3sCmaABE2BYRrhmU/新用户/${encodeURIComponent(wx.value)}`);

  submits++;
  localStorage.submits=submits;
  renderStats();

  resultMsg.textContent="✅ 已收到，我会联系你";
  resultMsg.style.color="#3cb371";

  btn.disabled=false;
  btn.textContent="提交";
  wx.value="";
};
</script>

</body>
</html>
