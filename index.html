<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月亮叫醒你了</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at 10% 10%, #f4f7f6, transparent 50%),
              radial-gradient(circle at 90% 90%, #eaeefc, transparent 50%),
              #f8fafc;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 440px;
  background: rgba(255, 255, 255, 0.85);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  padding: 40px 26px;
  box-shadow: 0 20px 40px rgba(140, 150, 170, 0.1);
}

/* 头部纯色标题 */
.header {
  text-align: center;
  margin-bottom: 30px;
}

h1 {
  font-size: 2em;
  font-weight: 600;
  color: #1a2530;
}

.sub {
  margin-top: 6px;
  color: #8a9aa9;
  font-size: 0.9em;
  letter-spacing: 1px;
}

/* 三个模块大小完全一样，高度扩充以容纳内容下移 */
.section {
  height: 145px; 
  display: flex;
  flex-direction: column;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(230, 235, 240, 0.8);
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 16px;
}

/* 标题更明显 */
.section-title {
  font-size: 1.05em;
  color: #1a2530;
  font-weight: 700;
}

/* 内容整体下移 */
.section-content {
  margin-top: auto; 
}

/* 下载模块排版布局 */
.download-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  font-size: 0.95em;
  color: #4a5568;
}
.download-row:last-child {
  margin-bottom: 0;
}
.download-label {
  width: 55px;
  font-weight: 500;
}

.btn-download {
  flex: 1;
  display: block;
  padding: 8px 12px;
  background: #3cb371;
  color: #fff;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.9em;
  text-align: center;
  border: none;
  cursor: pointer;
}

/* 苹果假按钮样式 */
.btn-disabled {
  flex: 1;
  display: block;
  padding: 8px 12px;
  background: #e2e8f0;
  color: #94a3b8;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.9em;
  text-align: center;
  border: none;
  cursor: not-allowed;
}

/* 微信按钮样式（整个微信号就是按钮） */
.btn-wechat-copy {
  display: block;
  width: 100%;
  padding: 12px;
  background: #edf2f0;
  color: #3cb371;
  border: 1px dashed rgba(60, 179, 113, 0.4);
  border-radius: 10px;
  font-size: 1.2em;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-wechat-copy:hover {
  background: #e2ede8;
}

/* 留资表单布局 */
.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  background: #fff;
  font-size: 0.9em;
  outline: none;
}

input:focus {
  border-color: #3cb371;
}

.btn-submit {
  padding: 0 24px;
  border: none;
  border-radius: 10px;
  background: #2c3e50;
  color: #fff;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.btn-submit:disabled {
  background: #cbd5e1;
  cursor: not-allowed;
}

/* 提示信息绝对定位，不撑开或改变模块高度 */
.msg-tip {
  font-size: 0.85em;
  text-align: center;
  margin-top: 4px;
  font-weight: 500;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.tip-container {
  position: relative;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>月亮叫醒你了</h1>
    <div class="sub">简单 · 稳定 · 长期</div>
  </div>

  <div class="section">
    <div class="section-title">网络工具下载：</div>
    <div class="section-content">
      <div class="download-row">
        <span class="download-label">安卓：</span>
        <a class="btn-download" target="_blank" href="https://one.714541.xyz/@s/eVFN3ldJ">下载链接</a>
      </div>
      <div class="download-row">
        <span class="download-label">苹果：</span>
        <button class="btn-disabled" disabled>appstore下载</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">添加微信：</div>
    <div class="section-content">
      <button class="btn-wechat-copy" id="copyBtn" title="点击复制微信号">gs-hjy</button>
    </div>
    <div class="tip-container"><div id="copyTip" class="msg-tip"></div></div>
  </div>

  <div class="section">
    <div class="section-title">或留下微信联系你：</div>
    <div class="section-content">
      <form id="form" class="input-group">
        <input id="wx" maxlength="30" placeholder="填写你的微信号">
        <button id="btn" class="btn-submit">提交</button>
      </form>
    </div>
    <div class="tip-container"><div id="resultMsg" class="msg-tip"></div></div>
  </div>
</div>

<script>
/* 复制逻辑 */
copyBtn.onclick = () => {
  navigator.clipboard.writeText(copyBtn.innerText).then(() => {
    copyTip.textContent = "已复制微信号";
    copyTip.style.color = "#3cb371";
    setTimeout(() => copyTip.textContent = "", 2000);
  });
};

/* 提交逻辑 */
form.onsubmit = e => {
  e.preventDefault();
  if(!wx.value.trim()) return;

  btn.disabled = true;
  btn.textContent = "提交中";

  fetch(`https://api.day.app/qYjTNs3sCmaABE2BYRrhmU/新用户/${encodeURIComponent(wx.value)}`);

  resultMsg.textContent = "已收到";
  resultMsg.style.color = "#3cb371";

  btn.disabled = false;
  btn.textContent = "提交";
  wx.value = "";
  setTimeout(() => resultMsg.textContent = "", 2000);
};
</script>

</body>
</html>
