<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮叫醒你了</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        /* 基础页面背景 */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            box-sizing: border-box;
        }

        /* 卡片主体样式 */
        .card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 24px;
            padding: 20px 16px 16px 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* 大标题与副标题 */
        .main-title {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            margin: 0 0 2px 0;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin: 0 0 15px 0; 
            letter-spacing: 1px;
        }

        /* 通用区块容器 */
        .section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 16px; 
            margin-bottom: 12px; 
            box-sizing: border-box;
        }
        
        /* 极致压缩第一个介绍区块的内边距 */
        .intro-section {
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .section:last-of-type {
            margin-bottom: 0;
        }

        /* 区块大标题 */
        .section-title {
            font-size: 14px;
            color: #0f172a;
            margin: 0 0 10px 0;
            font-weight: 600;
            text-align: left;
        }

        /* 介绍区块标题的下方留白 */
        .intro-section .section-title {
            margin-bottom: 6px;
        }

        /* 统一布局行 */
        .row {
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 15px;             
            margin-bottom: 10px;
        }
        .row:last-child {
            margin-bottom: 0;
        }

        /* 基础虚线框样式（130px 标准款） */
        .label-box {
            width: 130px;
            padding: 9px 0;      
            background: #f0fdf4;  
            border: 1px dashed #bbf7d0; 
            border-radius: 10px;
            font-size: 14px;      
            color: #16a34a;       
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
            white-space: nowrap;
        }

        /* 规范化大框内部的 padding */
        .intro-box {
            width: 275px;
            margin: 0 auto;         
            padding: 12px 8px;      
            background: #f0fdf4;
            border: 1px dashed #bbf7d0;
            border-radius: 10px;
            box-sizing: border-box;
            color: #16a34a;
            font-size: 15.5px;      
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* 通过控制每行 div 的 margin-bottom，让每行之间的间隙绝对一致 */
        .intro-line {
            margin-bottom: 6px;
            line-height: 1.2;
            box-sizing: border-box;
        }
        .intro-line:last-child {
            margin-bottom: 0;
        }

        /* 统一右侧绿色按钮样式 */
        .btn-link, .btn-copy, .btn-submit {
            width: 130px;
            border: none;
            padding: 9px 0; 
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none;
            display: inline-block;
            background-color: #22c55e;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        
        .btn-link:hover, .btn-copy:hover, .btn-submit:hover {
            background-color: #16a34a;
        }

        /* 输入框组合行 */
        .input-group-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* 输入框样式 */
        .input-field {
            width: 130px;
            padding: 9px 12px;
            background: #f0fdf4;  
            border: 1px dashed #bbf7d0; 
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            color: #334155;
            box-sizing: border-box;
            text-align: center;   
        }
        .input-field:focus {
            border-color: #16a34a;
        }

        /* 统一的下方提示小字样式 */
        .action-tip {
            visibility: hidden;
            text-align: center;
            font-size: 12px;
            color: #16a34a;       
            margin-top: 6px;
            font-weight: 500;
            height: 14px;        
            line-height: 14px;
        }
        .action-tip.error {
            color: #ef4444;
        }

        /* ================= 动态二维码图片样式（已拉长并防止裁剪） ================= */
        .qrcode-img {
            display: none; 
            width: 130px;
            height: 150px; /* 💡 修改点：将高度往上拉长至 150px，确保容纳完整的二维码和其上下边缘 */
            border-radius: 12px;
            border: 1px dashed #bbf7d0;
            box-sizing: border-box;
            object-fit: contain; /* 💡 修改点：改用 contain 模式，即使拉长，图片也会完整自适应比例显示，不被裁剪 */
            background-color: #ffffff; /* 补充背景，防止透明图边缘产生视觉断层 */
        }

        /* ================= 微信指引遮罩层样式 ================= */
        .weixin-mask {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            z-index: 9999; 
            box-sizing: border-box;
        }
        
        .mask-content {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffffff;
            text-align: right;
            padding: 10px;
        }

        /* 纯 CSS 绘制指引右上角的绿色箭头 */
        .mask-arrow {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 20px solid #22c55e; 
            margin-left: auto;
            margin-right: 15px;
            margin-bottom: 10px;
            transform: rotate(35deg); 
        }

        .mask-text {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6;
            text-align: right;
        }
        
        .mask-text span {
            color: #22c55e; 
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">月亮叫醒你了</h1>
    <p class="subtitle">简单 · 稳定 · 长期</p>

    <div class="section intro-section">
        <h2 class="section-title">网络优化服务：</h2>
        <div class="intro-box">
            <div class="intro-line">安卓、苹果、Win、Mac</div>
            <div class="intro-line">助力学术查阅、业务加速</div>
            <div class="intro-line">保证能用，加入即送使用教程</div>
            <div id="intro-tip-line" class="intro-line">直接复制下方V搜索添加</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">软件下载：</h2>
        
        <div class="row">
            <div class="label-box">安卓</div>
            <a href="javascript:void(0);" class="btn-link" onclick="handleDownload('https://one.714541.xyz/@s/eVFN3ldJ')">下载链接</a>
        </div>
        
        <div class="row">
            <div class="label-box">苹果</div>
            <a href="javascript:void(0);" class="btn-link" onclick="handleDownload('https://apps.apple.com')">App Store下载</a>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">添加V：</h2>
        
        <div class="row" style="flex-direction: column; align-items: center; gap: 0;">
            <div style="display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px;">
                <div id="wechat-num" class="label-box" style="font-size: 13px;">号码添加</div>
                
                <button id="btn-copy-ctrl" class="btn-copy" onclick="copyWeChat()">复制号码</button>
                
                <img id="qrcode-ctrl" src="https://tu.714541.xyz/wx.jpg" alt="微信二维码" class="qrcode-img">
            </div>
            
            <!-- 💡 新增：专门在外部浏览器下使用的文章跳转引流按钮行 -->
            <div id="browser-jump-row" class="row" style="display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px; margin-top: 10px;">
                <div class="label-box">扫码添加</div>
                <a href="https://mp.weixin.qq.com/s/eBpG1PQHgvH0kNSjkqJZbA" target="_blank" class="btn-link">点击跳转</a>
            </div>
            
            <div id="wechat-tip" class="action-tip">复制成功，粘贴在V搜索添加</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">或留下V联系你：</h2>
        
        <div class="input-group-wrapper">
            <div class="input-group">
                <input type="text" id="user-wechat" placeholder="填写你的V" class="input-field">
                <button class="btn-submit" onclick="submitForm()">提交</button>
            </div>
            <div id="submit-tip" class="action-tip">提交成功</div>
        </div>
    </div>
</div>

<div id="weixin-mask" class="weixin-mask" onclick="hideMask()">
    <div class="mask-content">
        <div class="mask-arrow"></div>
        <div class="mask-text">
            点击右上角 <span>•••</span><br>
            选择 <span>在浏览器中打开</span><br>
            即可正常下载安装软件
        </div>
    </div>
</div>

<script>
    // 检测是否在微信内置浏览器中
    function isWeChat() {
        const ua = navigator.userAgent.toLowerCase();
        return (ua.indexOf('micromessenger') !== -1) || (ua.indexOf('wxwork') !== -1);
    }

    // 初始化页面环境
    function initEnvironment() {
        if (isWeChat()) {
            document.getElementById('wechat-num').innerText = '长按扫码';
            // 💡 微信环境下为了配合二维码被拉长到150px，将左边的小方框内边距也同步拉长，实现完美水平对称
            document.getElementById('wechat-num').style.padding = '19px 0';
            document.getElementById('btn-copy-ctrl').style.display = 'none';
            document.getElementById('qrcode-ctrl').style.display = 'block';
            document.getElementById('intro-tip-line').innerText = '直接长按下方二维码识别添加';
            document.getElementById('wechat-tip').style.display = 'none';
            
            // 💡 微信内部打开时，隐藏浏览器跳转按钮行
            document.getElementById('browser-jump-row').style.display = 'none';
        } else {
            document.getElementById('wechat-num').innerText = '点击按钮';
            document.getElementById('wechat-num').style.padding = '9px 0'; // 还原浏览器下默认内边距
            document.getElementById('btn-copy-ctrl').style.display = 'inline-block';
            document.getElementById('qrcode-ctrl').style.display = 'none';
            document.getElementById('intro-tip-line').innerText = '直接复制下方V搜索添加';
            
            // 💡 外部浏览器打开时，确保跳转按钮正常显示并拉开间距
            document.getElementById('browser-jump-row').style.display = 'flex';
        }
    }

    // 执行环境初始化
    window.onload = initEnvironment;

    // 处理下载按钮点击拦截
    function handleDownload(url) {
        if (isWeChat()) {
            document.getElementById('weixin-mask').style.display = 'block';
        } else {
            window.location.href = url;
        }
    }

    // 点击遮罩层任意地方可以隐藏它
    function hideMask() {
        document.getElementById('weixin-mask').style.display = 'none';
    }

    // 一键复制V核心功能
    function copyWeChat() {
        const wechatNum = "_714541xyz";
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(wechatNum).then(() => {
                showTextTip('wechat-tip', '复制成功，粘贴 in V 搜索添加', false);
            }).catch(err => {
                fallbackCopy(wechatNum);
            });
        } else {
            fallbackCopy(wechatNum);
        }
    }

    // 备用复制方案
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showTextTip('wechat-tip', '复制成功，粘贴在V搜索添加', false);
        } catch (err) {
            showTextTip('wechat-tip', '复制失败，请手动长按复制', true);
        }
        document.body.removeChild(textarea);
    }

    // 留资发送到 Bark 接口
    function submitForm() {
        const inputEl = document.getElementById('user-wechat');
        const wechatId = inputEl.value.trim();
        
        if (!wechatId) {
            showTextTip('submit-tip', '请先填写V', true);
            return;
        }

        const barkUrl = `https://api.day.app/qYjTNs3sCmaABE2BYRrhmU/${encodeURIComponent('新用户')}/${encodeURIComponent(wechatId)}?group=WeChatLeads`;
        fetch(barkUrl, { method: 'GET', mode: 'cors' })
            .then(response => {
                if (response.ok) {
                    showTextTip('submit-tip', '提交成功', false);
                    inputEl.value = ''; 
                } else {
                    showTextTip('submit-tip', '提交失败，请重试', true);
                }
            })
            .catch(error => {
                showTextTip('submit-tip', '提交成功', false);
                inputEl.value = '';
            });
    }

    // 统一显隐状态函数
    function showTextTip(elementId, message, isError) {
        const tipEl = document.getElementById(elementId);
        tipEl.innerText = message;
        
        if (isError) {
            tipEl.classList.add('error');
        } else {
            tipEl.classList.remove('error');
        }
        
        tipEl.style.visibility = 'visible';
        setTimeout(() => {
            tipEl.style.visibility = 'hidden';
        }, 3000);
    }
</script>

</body>
</html>
