<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件下载</title>
    <style>
        /* 基础页面背景 */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 卡片主体样式 */
        .card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 32px;
            padding: 35px 24px 24px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* 大标题与副标题 */
        .main-title {
            text-align: center;
            font-size: 28px;
            color: #1e293b;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 拉大第一段顶部的间隙 */
        .download-section {
            margin-top: 45px;
        }

        /* 通用区块容器 */
        .section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .section:last-of-type {
            margin-bottom: 0;
        }

        /* 修改点：所有区块大标题后面加了冒号 */
        .section-title {
            font-size: 16px;
            color: #0f172a;
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        /* 布局行 */
        .row {
            display: flex;
            align-items: center;
            justify-content: center; 
            margin-bottom: 14px;
        }
        .row:last-child {
            margin-bottom: 0;
        }

        /* 左侧统一标签格式：安卓、苹果、微信 */
        .label {
            font-size: 17px;
            color: #1e293b;
            font-weight: 600;
            width: 60px;
            text-align: right;    /* 文字靠右对齐 */
            margin-right: 15px;   /* 与右侧按钮/盒子的紧贴间距 */
        }

        /* 统一的右侧组件宽度，确保上下绝对对齐且不松散 */
        .btn-link, .wechat-box {
            width: 160px;         /* 统一的按钮和盒子宽度 */
            box-sizing: border-box;
        }

        /* 安卓/苹果下载链接绿色按钮样式 */
        .btn-link {
            border: none;
            padding: 11px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none; 
            display: inline-block;
            background-color: #22c55e;
            color: #ffffff;
        }
        .btn-link:hover {
            background-color: #16a34a;
        }

        /* 修改点：微信展示区域样式，格式完全对齐上面的按钮 */
        .wechat-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #22c55e;  /* 统一成和上面一样的绿底 */
            border-radius: 10px;
            padding: 11px 12px;
            cursor: pointer;      /* 让整个区域看起来都可以点击复制 */
        }
        .wechat-box:hover {
            background-color: #16a34a;
        }

        /* 微信号文本 */
        .wechat-id {
            font-size: 14px;
            color: #ffffff;       /* 绿底配白字 */
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 复制号码小标签 */
        .copy-btn {
            background: rgba(255, 255, 255, 0.25); /* 半透明白色背景 */
            color: #ffffff;
            border: none;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 输入框区域自适应（留存微信号部分保持整行比例） */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: #ffffff;
            color: #334155;
            box-sizing: border-box;
        }

        .btn-submit {
            background: #1e293b;
            color: #ffffff;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">月亮叫醒你了</h1>
    <p class="subtitle">简单 · 稳定 · 长期</p>

    <div class="section download-section">
        <h2 class="section-title">软件下载：</h2>
        
        <div class="row">
            <span class="label">安卓</span>
            <a href="https://one.714541.xyz/@s/eVFN3ldJ" target="_blank" class="btn-link">下载链接</a>
        </div>
        
        <div class="row">
            <span class="label">苹果</span>
            <a href="https://apps.apple.com" target="_blank" class="btn-link">App Store下载</a>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">添加微信：</h2>
        
        <div class="row">
            <span class="label">微信</span>
            <div class="wechat-box" onclick="copyWeChat()">
                <span id="wechat-num" class="wechat-id">272017090</span>
                <button class="copy-btn">复制</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">或留下微信联系你：</h2>
        <div class="input-group">
            <input type="text" placeholder="填写你的微信号" class="input-field">
            <button class="btn-submit" onclick="submitForm()">提交</button>
        </div>
    </div>
</div>

<script>
    // 一键复制微信号核心功能
    function copyWeChat() {
        const wechatNum = document.getElementById('wechat-num').innerText;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(wechatNum).then(() => {
                showToast('微信号已复制');
            }).catch(err => {
                fallbackCopy(wechatNum);
            });
        } else {
            fallbackCopy(wechatNum);
        }
    }

    // 备用复制方案
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('微信号已复制');
        } catch (err) {
            showToast('复制失败，请手动长按复制');
        }
        document.body.removeChild(textarea);
    }

    function submitForm() {
        showToast('提交成功');
    }

    // 轻提示弹窗
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '60px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = 'rgba(0, 0, 0, 0.8)';
        toast.style.color = '#ffffff';
        toast.style.padding = '8px 16px';
        toast.style.borderRadius = '20px';
        toast.style.fontSize = '14px';
        toast.style.zIndex = '9999';
        toast.style.transition = 'opacity 0.2s';
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 200);
        }, 1500);
    }
</script>

</body>
</html>
