<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件下载</title>
    <style>
        /* 基础页面背景 */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 卡片主体样式 */
        .card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 32px;
            padding: 35px 24px 24px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* 大标题与副标题 */
        .main-title {
            text-align: center;
            font-size: 28px;
            color: #1e293b;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 拉大第一段顶部的间隙 */
        .download-section {
            margin-top: 45px;
        }

        /* 通用区块容器 */
        .section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* 修改点：把“添加微信”和“留下联系方式”的框都做大，留足呼吸感与提示空间 */
        .large-section {
            padding: 30px 20px; 
        }
        
        .section:last-of-type {
            margin-bottom: 0;
        }

        /* 区块大标题 */
        .section-title {
            font-size: 16px;
            color: #0f172a;
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        /* 统一布局行 */
        .row {
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 20px;             
            margin-bottom: 14px;
        }
        .row:last-child {
            margin-bottom: 0;
        }

        /* 下载与微信：左侧文本专属的虚线框样式 */
        .label-box {
            width: 130px;         
            padding: 11px 0;      
            background: #f0fdf4;  
            border: 1px dashed #bbf7d0; 
            border-radius: 10px;
            font-size: 15px;      
            color: #16a34a;       
            font-weight: 600;
            text-align: center;   
            box-sizing: border-box;
            white-space: nowrap;
        }

        /* 统一右侧绿色按钮样式 */
        .btn-link, .btn-copy, .btn-submit {
            width: 130px;         
            border: none;
            padding: 11px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none; 
            display: inline-block;
            background-color: #22c55e;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        
        .btn-link:hover, .btn-copy:hover, .btn-submit:hover {
            background-color: #16a34a;
        }

        /* 修改点：输入框组合行，给最外层增加 flex 布局并保持和上面一致的 gap 间距 */
        .input-group-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* 修改点：输入框大小格式不变，但左边灰色实线改成了跟上面一样的浅绿色虚线框 */
        .input-field {
            width: 130px;         /* 保持和 label-box 完全一样的大小格式 */
            padding: 11px 14px;
            background: #f0fdf4;  /* 浅绿背景底色 */
            border: 1px dashed #bbf7d0; /* 改为一致的虚线圈 */
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            color: #334155;
            box-sizing: border-box;
            text-align: center;   /* 让填写的文字也居中显示，更美观 */
        }
        /* 当输入框处于焦点时，虚线颜色略微加深提升交互感 */
        .input-field:focus {
            border-color: #16a34a;
        }

        /* 统一的下方提示小字样式：物理占位，消失时不拉扯、不收缩外框 */
        .action-tip {
            visibility: hidden;  /* 默认隐藏但保留占位 */
            text-align: center;
            font-size: 13px;
            color: #16a34a;       
            margin-top: 12px;
            font-weight: 500;
            height: 18px;        
            line-height: 18px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">月亮叫醒你了</h1>
    <p class="subtitle">简单 · 稳定 · 长期</p>

    <div class="section download-section">
        <h2 class="section-title">软件下载：</h2>
        
        <div class="row">
            <div class="label-box">安卓</div>
            <a href="https://one.714541.xyz/@s/eVFN3ldJ" target="_blank" class="btn-link">下载链接</a>
        </div>
        
        <div class="row">
            <div class="label-box">苹果</div>
            <a href="https://apps.apple.com" target="_blank" class="btn-link">App Store下载</a>
        </div>
    </div>

    <div class="section large-section">
        <h2 class="section-title">添加微信：</h2>
        
        <div class="row" style="flex-direction: column; align-items: center; gap: 0;">
            <div style="display: flex; align-items: center; justify-content: center; width: 100%; gap: 20px;">
                <div id="wechat-num" class="label-box" style="font-size: 14px;">272017090</div>
                <button class="btn-copy" onclick="copyWeChat()">复制号码</button>
            </div>
            <div id="wechat-tip" class="action-tip">复制成功，粘贴在微信搜索添加</div>
        </div>
    </div>

    <div class="section large-section">
        <h2 class="section-title">或留下微信联系你：</h2>
        
        <div class="input-group-wrapper">
            <div class="input-group">
                <input type="text" placeholder="填写你的微信号" class="input-field">
                <button class="btn-submit" onclick="submitForm()">提交</button>
            </div>
            <div id="submit-tip" class="action-tip">提交成功</div>
        </div>
    </div>
</div>

<script>
    // 一键复制微信号核心功能
    function copyWeChat() {
        const wechatNum = document.getElementById('wechat-num').innerText;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(wechatNum).then(() => {
                showTextTip('wechat-tip');
            }).catch(err => {
                fallbackCopy(wechatNum);
            });
        } else {
            fallbackCopy(wechatNum);
        }
    }

    // 备用复制方案
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showTextTip('wechat-tip');
        } catch (err) {
            alert('复制失败，请手动长按复制');
        }
        document.body.removeChild(textarea);
    }

    // 修改点：提交按钮点击后触发的新逻辑，在下方优雅显示“提交成功”
    function submitForm() {
        // 这里可以加入你的输入框非空验证逻辑，这里直接演示成功提示
        showTextTip('submit-tip');
    }

    // 统一控制下方小字提示显现与消失的通用函数（使用 visibility 占位，框体绝不收缩）
    function showTextTip(elementId) {
        const tipEl = document.getElementById(elementId);
        tipEl.style.visibility = 'visible'; 
        
        // 3秒后小字隐藏，但依然占据原有空间，外框大小完全锁死
        setTimeout(() => {
            tipEl.style.visibility = 'hidden';
        }, 3000);
    }
</script>

</body>
</html>
