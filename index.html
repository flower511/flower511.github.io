<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件下载</title>
    <style>
        /* 基础页面背景 */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 卡片主体样式 */
        .card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 32px;
            padding: 35px 24px 24px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
        }

        /* 大标题与副标题 */
        .main-title {
            text-align: center;
            font-size: 28px;
            color: #1e293b;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 拉大第一段顶部的间隙 */
        .download-section {
            margin-top: 45px;
        }

        /* 通用区块容器 */
        .section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .section:last-of-type {
            margin-bottom: 0;
        }

        /* 区块大标题 */
        .section-title {
            font-size: 16px;
            color: #0f172a;
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        /* 统一布局行 */
        .row {
            display: flex;
            align-items: center;
            justify-content: center; 
            margin-bottom: 14px;
        }
        .row:last-child {
            margin-bottom: 0;
        }

        /* 左侧标签：固定宽度、文字右对齐，紧贴右边按钮 */
        .label {
            font-size: 17px;
            color: #1e293b;
            font-weight: 600;
            width: 95px;          
            text-align: right;    
            margin-right: 15px;   
            white-space: nowrap;
        }

        /* 统一的右侧按钮宽度 */
        .btn-link, .btn-copy {
            width: 160px;
            border: none;
            padding: 11px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none; 
            display: inline-block;
            background-color: #22c55e;
            color: #ffffff;
        }
        
        .btn-link:hover, .btn-copy:hover {
            background-color: #16a34a;
        }

        /* 修改点：文本下方的小字提示样式 */
        .copy-tip {
            display: none;       /* 默认隐藏，点击复制后再显示 */
            text-align: center;
            font-size: 13px;
            color: #16a34a;       /* 绿字提示 */
            margin-top: 10px;
            font-weight: 500;
        }

        /* 输入框区域自适应 */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: #ffffff;
            color: #334155;
            box-sizing: border-box;
        }

        .btn-submit {
            background: #1e293b;
            color: #ffffff;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <h1 class="main-title">月亮叫醒你了</h1>
    <p class="subtitle">简单 · 稳定 · 长期</p>

    <div class="section download-section">
        <h2 class="section-title">软件下载：</h2>
        
        <div class="row">
            <span class="label">安卓</span>
            <a href="https://one.714541.xyz/@s/eVFN3ldJ" target="_blank" class="btn-link">下载链接</a>
        </div>
        
        <div class="row">
            <span class="label">苹果</span>
            <a href="https://apps.apple.com" target="_blank" class="btn-link">App Store下载</a>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">添加微信：</h2>
        
        <div class="row" style="flex-direction: column; align-items: center;">
            <div style="display: flex; align-items: center; justify-content: center; width: 100%;">
                <span id="wechat-num" class="label">272017090</span>
                <button class="btn-copy" onclick="copyWeChat()">复制号码</button>
            </div>
            <div id="wechat-tip" class="copy-tip">复制成功，粘贴在微信搜索添加</div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">或留下微信联系你：</h2>
        <div class="input-group">
            <input type="text" placeholder="填写你的微信号" class="input-field">
            <button class="btn-submit" onclick="submitForm()">提交</button>
        </div>
    </div>
</div>

<script>
    // 一键复制微信号核心功能
    function copyWeChat() {
        const wechatNum = document.getElementById('wechat-num').innerText;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(wechatNum).then(() => {
                showTextTip();
            }).catch(err => {
                fallbackCopy(wechatNum);
            });
        } else {
            fallbackCopy(wechatNum);
        }
    }

    // 备用复制方案
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showTextTip();
        } catch (err) {
            alert('复制失败，请手动长按复制');
        }
        document.body.removeChild(textarea);
    }

    // 修改点：控制下方小字提示显现与消失的逻辑
    function showTextTip() {
        const tipEl = document.getElementById('wechat-tip');
        tipEl.style.display = 'block'; // 显示小字
        
        // 3秒后自动淡出消失，或者你可以删掉下面这行让它永久显示
        setTimeout(() => {
            tipEl.style.display = 'none';
        }, 3000);
    }

    function submitForm() {
        alert('提交成功');
    }
</script>

</body>
</html>
