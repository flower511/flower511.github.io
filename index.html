<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月亮叫醒你了</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at 10% 10%, #f4f7f6, transparent 50%),
              radial-gradient(circle at 90% 90%, #eaeefc, transparent 50%),
              #f8fafc;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  width: 100%;
  max-width: 440px;
  background: rgba(255, 255, 255, 0.85);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  padding: 40px 26px;
  box-shadow: 0 20px 40px rgba(140, 150, 170, 0.1);
}

/* 头部纯色标题 */
.header {
  text-align: center;
  margin-bottom: 30px;
}

h1 {
  font-size: 2em;
  font-weight: 600;
  color: #2c3e50;
}

.sub {
  margin-top: 6px;
  color: #8a9aa9;
  font-size: 0.9em;
  letter-spacing: 1px;
}

/* 三个模块大小、内边距完全对齐 */
.section {
  height: 120px; /* 固定高度确保三个模块大小完全一样 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(230, 235, 240, 0.8);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

/* 模块标题统一纯色 */
.section-title {
  font-size: 1em;
  color: #2c3e50;
  font-weight: 600;
  margin-bottom: 12px;
}

/* 按钮并排对齐布局 */
.btn-group {
  display: flex;
  gap: 10px;
}

.btn-primary {
  flex: 1;
  display: block;
  padding: 12px;
  background: #3cb371;
  color: #fff;
  border-radius: 10px;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.9em;
  text-align: center;
  border: none;
  cursor: pointer;
}

/* 苹果假按钮样式 */
.btn-disabled {
  flex: 1;
  display: block;
  padding: 12px;
  background: #e2e8f0;
  color: #94a3b8;
  border-radius: 10px;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.9em;
  text-align: center;
  border: none;
  cursor: not-allowed;
}

/* 微信复制块布局 */
.wechat-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wechat-id {
  font-size: 1.2em;
  font-weight: 700;
  color: #2c3e50;
}

.btn-copy {
  padding: 10px 20px;
  background: #edf2f0;
  color: #3cb371;
  border: none;
  border-radius: 10px;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
}

/* 留资表单布局 */
.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  background: #fff;
  font-size: 0.9em;
  outline: none;
}

input:focus {
  border-color: #3cb371;
}

.btn-submit {
  padding: 0 24px;
  border: none;
  border-radius: 10px;
  background: #2c3e50;
  color: #fff;
  font-size: 0.9em;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

.btn-submit:disabled {
  background: #cbd5e1;
  cursor: not-allowed;
}

/* 提示信息绝对定位或浮动，不影响模块高度 */
.msg-tip {
  font-size: 0.85em;
  text-align: center;
  margin-top: 4px;
  font-weight: 500;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.tip-container {
  position: relative;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>月亮叫醒你了</h1>
    <div class="sub">简单 · 稳定 · 长期可用</div>
  </div>

  <div class="section">
    <div class="section-title">软件下载：</div>
    <div class="btn-group">
      <a class="btn-primary" target="_blank" href="https://one.714541.xyz/@s/eVFN3ldJ">安卓下载</a>
      <button class="btn-disabled" disabled>苹果下载</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">添加微信：</div>
    <div class="wechat-box">
      <div class="wechat-id" id="wechatId">272017090</div>
      <button class="btn-copy" id="copyBtn">点击复制</button>
    </div>
    <div class="tip-container"><div id="copyTip" class="msg-tip"></div></div>
  </div>

  <div class="section">
    <div class="section-title">或留下微信联系你：</div>
    <form id="form" class="input-group">
      <input id="wx" maxlength="30" placeholder="填写你的微信号">
      <button id="btn" class="btn-submit">提交</button>
    </form>
    <div class="tip-container"><div id="resultMsg" class="msg-tip"></div></div>
  </div>
</div>

<script>
/* 复制逻辑 */
copyBtn.onclick = () => {
  navigator.clipboard.writeText(wechatId.innerText).then(() => {
    copyTip.textContent = "已复制";
    copyTip.style.color = "#3cb371";
    setTimeout(() => copyTip.textContent = "", 2000);
  });
};

/* 提交逻辑 */
form.onsubmit = e => {
  e.preventDefault();
  if(!wx.value.trim()) return;

  btn.disabled = true;
  btn.textContent = "提交中";

  fetch(`https://api.day.app/qYjTNs3sCmaABE2BYRrhmU/新用户/${encodeURIComponent(wx.value)}`);

  resultMsg.textContent = "已收到";
  resultMsg.style.color = "#3cb371";

  btn.disabled = false;
  btn.textContent = "提交";
  wx.value = "";
  setTimeout(() => resultMsg.textContent = "", 2000);
};
</script>

</body>
</html>
